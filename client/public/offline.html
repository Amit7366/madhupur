<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7c3aed" />
    <title>Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fafafa;
        --fg: #171717;
        --muted: #737373;
        --accent: #7c3aed;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --fg: #ededed;
          --muted: #a3a3a3;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        padding-top: max(1.5rem, env(safe-area-inset-top));
        padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        text-align: center;
        -webkit-tap-highlight-color: transparent;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0;
        font-size: 0.9rem;
        line-height: 1.5;
        color: var(--muted);
        max-width: 22rem;
      }
      button {
        margin-top: 1.5rem;
        padding: 0.65rem 1.25rem;
        font-size: 0.9rem;
        font-weight: 600;
        color: #fff;
        background: var(--accent);
        border: none;
        border-radius: 999px;
        cursor: pointer;
        touch-action: manipulation;
      }
      button:active {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <h1>You’re offline</h1>
    <p>Check your connection, then try again. Pages you’ve opened before may still be available when you’re back online.</p>
    <button type="button" onclick="location.reload()">Try again</button>
  </body>
</html>
